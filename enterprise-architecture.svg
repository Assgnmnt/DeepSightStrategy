<svg viewBox="0 0 700 880" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Enterprise architecture: from vision to execution</title>
<desc>A vertical blueprint-style diagram showing five connected layers of enterprise architecture: Vision, Strategy, Operating Model, Systems, and Execution.</desc>

<rect width="700" height="880" fill="#FBFAF7"/>

<g opacity="0.5">
<line x1="0" y1="0" x2="0" y2="880" stroke="#D8D3C8" stroke-width="0.5"/>
<line x1="700" y1="0" x2="700" y2="880" stroke="#D8D3C8" stroke-width="0.5"/>
<line x1="50" y1="0" x2="50" y2="880" stroke="#E5E1D8" stroke-width="0.4" stroke-dasharray="1 5"/>
<line x1="650" y1="0" x2="650" y2="880" stroke="#E5E1D8" stroke-width="0.4" stroke-dasharray="1 5"/>
</g>

<line x1="350" y1="115" x2="350" y2="765" stroke="#D8D3C8" stroke-width="1.2"/>

<g>
  <rect x="120" y="55" width="460" height="100" rx="4" fill="none" stroke="#0D1B2E" stroke-width="1.5"/>
  <text x="350" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="21" fill="#0D1B2E" font-weight="bold">Vision</text>
  <text x="350" y="115" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="12" fill="#5A6A7A">Where the organization is going</text>
  <text x="138" y="72" font-family="DM Sans, Arial, sans-serif" font-size="9.5" fill="#A07820" letter-spacing="1.5">01</text>
</g>

<circle cx="350" cy="180" r="4" fill="#A07820"/>

<g>
  <rect x="120" y="200" width="460" height="100" rx="4" fill="none" stroke="#0D1B2E" stroke-width="1.5"/>
  <text x="350" y="237" text-anchor="middle" font-family="Georgia, serif" font-size="21" fill="#0D1B2E" font-weight="bold">Strategy</text>
  <text x="350" y="260" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="12" fill="#5A6A7A">The path to get there</text>
  <text x="138" y="217" font-family="DM Sans, Arial, sans-serif" font-size="9.5" fill="#A07820" letter-spacing="1.5">02</text>
</g>

<circle cx="350" cy="325" r="4" fill="#A07820"/>

<g>
  <rect x="120" y="345" width="460" height="100" rx="4" fill="#0D1B2E" stroke="#A07820" stroke-width="1.2"/>
  <text x="350" y="382" text-anchor="middle" font-family="Georgia, serif" font-size="21" fill="#FFFFFF" font-weight="bold">Operating Model</text>
  <text x="350" y="405" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="12" fill="#C8D0DA">How the organization runs day to day</text>
  <text x="138" y="362" font-family="DM Sans, Arial, sans-serif" font-size="9.5" fill="#C4A96A" letter-spacing="1.5">03</text>
</g>

<circle cx="350" cy="470" r="4" fill="#A07820"/>

<g>
  <rect x="120" y="490" width="460" height="100" rx="4" fill="none" stroke="#0D1B2E" stroke-width="1.5"/>
  <text x="350" y="527" text-anchor="middle" font-family="Georgia, serif" font-size="21" fill="#0D1B2E" font-weight="bold">Systems</text>
  <text x="350" y="550" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="12" fill="#5A6A7A">The infrastructure that scales it</text>
  <text x="138" y="507" font-family="DM Sans, Arial, sans-serif" font-size="9.5" fill="#A07820" letter-spacing="1.5">04</text>
</g>

<circle cx="350" cy="615" r="4" fill="#A07820"/>

<g>
  <rect x="120" y="635" width="460" height="100" rx="4" fill="none" stroke="#0D1B2E" stroke-width="1.5"/>
  <text x="350" y="672" text-anchor="middle" font-family="Georgia, serif" font-size="21" fill="#0D1B2E" font-weight="bold">Execution</text>
  <text x="350" y="695" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="12" fill="#5A6A7A">Where strategy becomes results</text>
  <text x="138" y="652" font-family="DM Sans, Arial, sans-serif" font-size="9.5" fill="#A07820" letter-spacing="1.5">05</text>
</g>

<text x="350" y="800" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="11" fill="#A07820" letter-spacing="3" font-weight="600">DEEPSIGHT ENTERPRISE ARCHITECTURE</text>

</svg>
