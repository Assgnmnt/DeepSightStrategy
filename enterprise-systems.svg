</g>

<g stroke="#A07820" stroke-width="0.5" opacity="0.5">
<line x1="180" y1="560" x2="360" y2="560"/>
<line x1="380" y1="460" x2="560" y2="460"/>
<line x1="580" y1="350" x2="760" y2="350"/>
<line x1="780" y1="500" x2="960" y2="500"/>
<line x1="980" y1="420" x2="1160" y2="420"/>
