<line x1="1320" y1="640" x2="1320" y2="800"/>
</g>

<circle cx="670" cy="320" r="5" fill="#A07820"/>
<line x1="670" y1="350" x2="670" y2="270" stroke="#A07820" stroke-width="0.5" opacity="0.6"/>

<rect x="0" y="840" width="1600" height="2" fill="#A07820" opacity="0.4"/>

</svg>
