<line x1="670" y1="390" x2="670" y2="800"/>
<line x1="720" y1="390" x2="720" y2="800"/>
<line x1="820" y1="540" x2="820" y2="800"/>
<line x1="870" y1="540" x2="870" y2="800"/>
<line x1="920" y1="540" x2="920" y2="800"/>
<line x1="1020" y1="460" x2="1020" y2="800"/>
<line x1="1070" y1="460" x2="1070" y2="800"/>
<line x1="1120" y1="460" x2="1120" y2="800"/>
