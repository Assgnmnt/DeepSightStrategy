</g>

<g stroke="#C4A96A" stroke-width="0.4" opacity="0.3">
<line x1="220" y1="600" x2="220" y2="800"/>
<line x1="270" y1="600" x2="270" y2="800"/>
<line x1="320" y1="600" x2="320" y2="800"/>
<line x1="420" y1="500" x2="420" y2="800"/>
