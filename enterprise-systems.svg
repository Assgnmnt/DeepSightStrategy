<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Abstract architectural artwork representing enterprise systems and structural design</title>
<desc>A geometric composition of layered navy rectangular forms resembling a blueprint or building facade, with gold structural accent lines.</desc>

<rect width="1600" height="900" fill="#F5F3EF"/>

<g opacity="0.9">
<rect x="180" y="560" width="180" height="280" fill="#16324E"/>
<rect x="380" y="460" width="180" height="380" fill="#0F2236"/>
<rect x="580" y="350" width="180" height="490" fill="#0D1B2E"/>
